        :root {
            --app-height: 100%;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        /* Mobile-Optimized Masonry */
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
        }

        .masonry-item {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #0f172a;
        }

        /* Glass Effects */
        .glass-header {
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: var(--safe-top);
        }

        .glass-footer {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: var(--safe-bottom);
        }

        #progress {
            height: 2px;
            background: #8b5cf6;
            width: 0%;
            transition: width 0.1s;
        }

        .img-reveal {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .img-reveal.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-btn {
            position: relative;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #a78bfa;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #a78bfa;
        }

        .toast-mobile {
            bottom: 100px;
        }
    </style>

    <div id="toast" class="fixed toast-mobile left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all z-[150] font-bold text-xs pointer-events-none whitespace-nowrap"></div>

    <script>
        const CATEGORIES = {
            sfw: {
                image: ["waifu", "neko", "shinobu", "megumin", "bully", "awoo", "smile", "wave", "highfive", "handhold", "nom", "bite", "glomp", "slap", "kill", "kick", "happy", "wink", "poke", "dance", "cringe"],
                png: ["waifu", "neko", "shinobu", "megumin"],
                gif: ["bully", "cuddle", "cry", "hug", "kiss", "lick", "pat", "smug", "bonk", "yeet", "blush", "smile", "wave"],
                sticker: ["smile", "poke", "wink", "happy", "dance", "wave", "highfive"]
            },
            nsfw: {
                image: ["waifu", "neko", "trap"],
                png: ["waifu", "neko", "trap"],
                gif: ["blowjob"],
                sticker: ["waifu", "neko"]
            }
        };

        let currentType = 'sfw', currentFormat = 'image', currentView = 'gallery';
        let isLoading = false, isAdultVerified = false;
        let favorites = JSON.parse(localStorage.getItem('anime_hub_favs_mob') || '[]');

        const gallery = document.getElementById('gallery');
        const catSelect = document.getElementById('catSelect');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function setupCategories() {
            const list = CATEGORIES[currentType][currentFormat];
            catSelect.innerHTML = list.map(cat => `<option value="${cat}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</option>`).join('');
        }

        const observer = new IntersectionObserver((e) => {
            if (e[0].isIntersecting && !isLoading && currentView === 'gallery') fetchImages();
        }, { threshold: 0.1 });
        observer.observe(document.getElementById('sentinel'));

        async function fetchImages() {
            if (isLoading || !catSelect.value) return;
            isLoading = true;
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch(`https://api.waifu.pics/many/${currentType}/${catSelect.value}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                if (data.files) {
                    let files = data.files;
                    if (currentFormat === 'png') files = files.filter(u => u.toLowerCase().endsWith('.png'));
                    files.forEach(url => gallery.appendChild(createMobileCard(url)));
                }
            } catch (err) {
                showToast("Connection failed");
            } finally {
                isLoading = false;
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function createMobileCard(url) {
            const div = document.createElement('div');
            div.className = 'masonry-item img-reveal';
            const isFav = favorites.includes(url);
            div.innerHTML = `
                <img src="${url}" loading="lazy" class="w-full h-auto block" onload="this.parentElement.classList.add('loaded')">
                <div class="absolute bottom-2 right-2 flex gap-1">
                    <button onclick="toggleFavorite('${url}', event)" class="p-2 bg-black/40 backdrop-blur-md rounded-lg shadow-lg">
                        <svg class="w-4 h-4 ${isFav ? 'text-red-500 fill-current' : 'text-white'}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                    </button>
                </div>
            `;
            div.onclick = () => openLightbox(url);
            return div;
        }

        function toggleFavorite(url, e) {
            if (e) e.stopPropagation();
            const idx = favorites.indexOf(url);
            if (idx === -1) {
                favorites.push(url);
                showToast("Saved to collection");
            } else {
                favorites.splice(idx, 1);
                showToast("Removed from collection");
                if (currentView === 'fav') openView('fav');
            }
            localStorage.setItem('anime_hub_favs_mob', JSON.stringify(favorites));
            updateHeartUI(url);
        }

        function updateHeartUI(url) {
            const isFav = favorites.includes(url);
            const lbHeart = document.getElementById('lbHeart');
            if (lightboxImg.src === url) {
                lbHeart.classList.toggle('text-red-500', isFav);
                lbHeart.classList.toggle('fill-current', isFav);
            }
            document.querySelectorAll(`img[src="${url}"]`).forEach(img => {
                const btn = img.parentElement.querySelector('button svg');
                if (btn) {
                    btn.classList.toggle('text-red-500', isFav);
                    btn.classList.toggle('fill-current', isFav);
                }
            });
        }

        function setFormat(f) {
            currentFormat = f;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(f + 'Tab').classList.add('active');
            setupCategories(); resetAndFetch();
        }

        function handleToggle(t) {
            if (t === 'nsfw' && !isAdultVerified) { openModal('ageModal'); return; }
            currentType = t;
            document.getElementById('sfwBtn').classList.toggle('bg-purple-600', t === 'sfw');
            document.getElementById('sfwBtn').classList.toggle('text-slate-400', t === 'nsfw');
            document.getElementById('nsfwBtn').classList.toggle('bg-red-600', t === 'nsfw');
            document.getElementById('nsfwBtn').classList.toggle('text-slate-400', t === 'sfw');
            setupCategories(); resetAndFetch();
        }

        function openView(v) {
            currentView = v;
            gallery.innerHTML = '';
            document.getElementById('navHome').classList.toggle('text-purple-500', v === 'gallery');
            document.getElementById('navHome').classList.toggle('text-slate-500', v === 'fav');
            document.getElementById('navFav').classList.toggle('text-purple-500', v === 'fav');
            document.getElementById('navFav').classList.toggle('text-slate-500', v === 'gallery');

            if (v === 'fav') {
                favorites.forEach(url => gallery.appendChild(createMobileCard(url)));
                if (favorites.length === 0) showToast("Your collection is empty");
            } else {
                resetAndFetch();
            }
            scrollToTop();
        }

        function resetAndFetch() { gallery.innerHTML = ''; fetchImages(); }
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function shuffleCategory() {
            const l = CATEGORIES[currentType][currentFormat];
            catSelect.value = l[Math.floor(Math.random() * l.length)];
            resetAndFetch();
        }

        function openLightbox(url) {
            lightboxImg.src = url;
            lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            updateHeartUI(url);
            document.getElementById('lbFavBtn').onclick = () => toggleFavorite(url);
            document.getElementById('lbShareBtn').onclick = () => shareContent(url);
            document.getElementById('downloadBtn').onclick = () => window.open(url, '_blank');
        }

        function closeLightbox() { lightbox.classList.add('hidden'); document.body.style.overflow = 'auto'; }
        
        async function shareHub() {
            const url = window.location.href;
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Anime Hub', text: 'Best Anime imagery on mobile', url: url });
                } catch (err) {
                    copyToClipboard(url, "Link copied to clipboard");
                }
            } else {
                copyToClipboard(url, "Link copied to clipboard");
            }
        }

        async function shareContent(url) {
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Anime Art', text: 'Found this on Anime Hub', url: url });
                } catch (err) {
                    copyToClipboard(url, "Image link copied to clipboard");
                }
            } else {
                copyToClipboard(url, "Image link copied to clipboard");
            }
        }

        function copyToClipboard(text, msg) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(msg);
            } catch (err) {
                showToast("Failed to copy link");
            }
            document.body.removeChild(textArea);
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.classList.replace('opacity-0', 'opacity-100');
            t.classList.replace('translate-y-10', 'translate-y-0');
            setTimeout(() => {
                t.classList.replace('opacity-100', 'opacity-0');
                t.classList.replace('translate-y-0', 'translate-y-10');
            }, 2000);
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function verifyAge() { isAdultVerified = true; closeModal('ageModal'); handleToggle('nsfw'); }

        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress").style.width = scrolled + "%";
        });

        window.onload = () => { setupCategories(); fetchImages(); };
    </script>
</body>
</html>
